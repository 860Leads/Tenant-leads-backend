# Generated by scripts/deploy-render.sh — safe to commit. Fields marked
# "sync: false" are secrets you paste into the Render dashboard yourself;
# they are never written to this file or to git.
services:
  - type: web
    name: tenant-leads-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/tenants/health
    autoDeploy: true
    envVars:
      - key: TENANTS_MODULE_ENABLED
        value: "true"
      - key: LANDLORD_EMAIL
        value: "greglaflam@gmail.com"
      - key: LANDLORD_PHONE
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: GOOGLE_SHEETS_CLIENT_EMAIL
        sync: false
      - key: GOOGLE_SHEETS_PRIVATE_KEY
        sync: false
      - key: GOOGLE_SHEETS_SPREADSHEET_ID
        sync: false
      - key: GOOGLE_SHEETS_TENANT_TAB
        value: "d"
      - key: MAKE_TENANTS_WEBHOOK_URL
        sync: false
      - key: TENANTS_ADMIN_API_KEY
        generateValue: true
      - key: TENANTS_RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: TENANTS_RATE_LIMIT_MAX
        value: "20"
      - key: TENANTS_DEFAULT_RENT
        value: "1800"
